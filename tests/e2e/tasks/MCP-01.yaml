id: MCP-01
category: mcp_tools
scenario: us2_mcp
model: amazon-bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
description: "iris_compile is called and returns a real IRIS result"
prompt: "Compile the class User.HarnessTestClass using the iris_compile tool."
fixtures:
  - type: cls
    name: User.HarnessTestClass
    content: |
      Class User.HarnessTestClass Extends %RegisteredObject
      {

      ClassMethod Hello() As %String [ CodeMode = expression ]
      {
      "Hello from HarnessTestClass"
      }

      }
skills_to_install: []
assertions:
  - type: tool_called
    pattern: "iris_agentic_dev:iris_compile"
    description: "iris_compile MCP tool must be called"
    required: true
expected_tool_calls:
  - "iris_agentic_dev:iris_compile"
# Note: OpenCode event stream emits this as 'iris_agentic_dev_iris_compile'
# (server hyphens→underscores, underscore separator). parse_mcp_tool handles this.
